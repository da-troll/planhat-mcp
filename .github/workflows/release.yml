name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Verify tag matches package.json and manifest versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          MANIFEST=$(jq -r .version manifest.json)
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Version mismatch: tag=$TAG package.json=$PKG manifest=$MANIFEST"
            exit 1
          fi
      - name: Install
        run: npm ci
      - name: Verify before releasing
        run: |
          npm run typecheck
          npm test
          npm run build
      - name: Pack MCPB bundle and verify contents against allowlist
        run: |
          npx -y @anthropic-ai/mcpb@2.1.2 validate manifest.json
          npx -y @anthropic-ai/mcpb@2.1.2 pack . planhat-mcp.mcpb
          actual=$(unzip -Z1 planhat-mcp.mcpb | sort)
          expected=$(printf 'LICENSE\nREADME.md\ndist/server.js\nmanifest.json\n' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "::error::Bundle contents drifted from the allowlist"
            diff <(echo "$expected") <(echo "$actual") || true
            exit 1
          fi
      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: planhat-mcp.mcpb
